<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peta Probabilitas Gempa — Indonesia</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌏</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header id="navbar"></header>
  <div class="app-container">
    <div class="map-wrapper">
      <div id="map"></div>
      <div class="map-overlay-container" style="position: absolute; top: 16px; left: 60px; z-index: 999; display: flex; flex-direction: column; gap: 10px; align-items: start;">
        <!-- Filter Controls -->
        <div class="map-controls" style="position: static; margin: 0;">
          <div>
            <label>Horizon</label>
            <select id="horizon">
              <option value="7">7 hari</option>
              <option value="14">14 hari</option>
              <option value="30" selected>30 hari</option>
              <option value="60">60 hari</option>
            </select>
          </div>
          <div>
            <label>Magnitude</label>
            <select id="threshold">
              <option value="4.5">M ≥ 4.5</option>
              <option value="5.0" selected>M ≥ 5.0</option>
              <option value="5.5">M ≥ 5.5</option>
              <option value="6.0">M ≥ 6.0</option>
            </select>
          </div>
          <div style="display:flex;align-items:end;">
            <button id="refresh" class="btn" style="height: 32px; padding: 0 16px; display: flex; align-items: center; justify-content: center;">Refresh</button>
          </div>
        </div>

        <!-- Floating Search Bar -->
        <div class="map-search-bar" style="background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); width: 280px; position: relative;">
          <div class="search-container" style="margin-bottom: 0; width: 100%; position: relative;">
            <span class="search-icon" style="font-size: 13px; left: 10px; top: 50%; transform: translateY(-50%); position: absolute; color: var(--text-muted); pointer-events: none;">🔍</span>
            <input type="text" id="search-input" class="search-box-input" placeholder="Cari daerah... (misal: Palu)" style="padding: 6px 12px 6px 32px; height: 32px; font-size: 13px; width: 100%; background: #1e293b; color: var(--text); border: 1px solid var(--border); border-radius: 8px; outline: none; transition: all 0.2s;">
            <ul class="search-results" id="search-results" style="display:none; top: calc(100% + 4px); position: absolute; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; list-style: none; margin: 0; padding: 0; z-index: 1010; box-shadow: var(--shadow);"></ul>
          </div>
        </div>
      </div>
      <div class="legend">
        <div class="item"><span class="swatch" style="background:#10b981"></span>&lt; 0.5%</div>
        <div class="item"><span class="swatch" style="background:#84cc16"></span>0.5–1%</div>
        <div class="item"><span class="swatch" style="background:#f59e0b"></span>1–3%</div>
        <div class="item"><span class="swatch" style="background:#f97316"></span>3–6%</div>
        <div class="item"><span class="swatch" style="background:#ef4444"></span>&gt; 6%</div>
      </div>
    </div>
    <aside class="sidebar">
      <h2>Top 10 Area Risiko</h2>
      <div class="meta" id="last-update">—</div>
      <ul class="top-list" id="top-list">
        <li class="skeleton" style="height:60px;"></li>
        <li class="skeleton" style="height:60px;"></li>
        <li class="skeleton" style="height:60px;"></li>
      </ul>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module">
    import { api, probColor, formatPct, formatTime, showToast } from "/static/js/api.js";
    import { renderNavbar } from "/static/js/navbar.js";

    renderNavbar("map");

    const map = L.map("map", { zoomControl: true }).setView([-2.5, 118], 5);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OSM &copy; CARTO',
      subdomains: "abcd", maxZoom: 19,
    }).addTo(map);

    let cellLayer = null;
    let highlightedLayer = null;
    let allForecastItems = []; // Storing latest loaded items for search

    function highlightCell(cellId) {
      if (!cellLayer) return;
      let foundLayer = null;
      cellLayer.eachLayer(layer => {
        if (layer.feature.properties.cell_id === cellId) {
          foundLayer = layer;
        }
      });

      if (foundLayer) {
        // Reset previous highlighted layer
        if (highlightedLayer) {
          cellLayer.resetStyle(highlightedLayer);
        }
        
        // Highlight new layer
        highlightedLayer = foundLayer;
        foundLayer.setStyle({
          color: "#3b82f6",
          weight: 3,
          fillOpacity: 0.85,
        });
        foundLayer.bringToFront();

        // Center map and open popup
        map.setView(foundLayer.getBounds().getCenter(), 8);
        foundLayer.openPopup();
      }
    }

    // Expose to window for inline onclick execution
    window.highlightCell = highlightCell;

    // Reset style when popup closes
    map.on("popupclose", (e) => {
      if (highlightedLayer && highlightedLayer.getPopup() === e.popup) {
        cellLayer.resetStyle(highlightedLayer);
        highlightedLayer = null;
      }
    });

    async function loadData() {
      const horizon = parseInt(document.getElementById("horizon").value);
      const threshold = parseFloat(document.getElementById("threshold").value);
      try {
        const data = await api.get("/api/forecasts/latest", { horizon, threshold });
        allForecastItems = data.items;
        renderMap(data.items);
        const top = await api.get("/api/forecasts/top", { n: 10, horizon, threshold });
        renderTop(top, horizon, threshold);

        // Check if there is a cell ID in the URL to highlight on load
        const urlParams = new URLSearchParams(window.location.search);
        const cellParam = urlParams.get("cell");
        if (cellParam) {
          // Clear query param from address bar so it doesn't zoom again on refresh
          window.history.replaceState({}, document.title, window.location.pathname);
          setTimeout(() => {
            highlightCell(cellParam);
          }, 200);
        }
      } catch (e) {
        showToast(`Error: ${e.message}`, "error");
      }
    }

    function renderMap(items) {
      if (cellLayer) map.removeLayer(cellLayer);
      const features = items
        .filter(it => it.probability != null && it.lat_min != null)
        .map(it => ({
          type: "Feature",
          properties: { ...it },
          geometry: {
            type: "Polygon",
            coordinates: [[
              [it.lon_min, it.lat_min], [it.lon_max, it.lat_min],
              [it.lon_max, it.lat_max], [it.lon_min, it.lat_max], [it.lon_min, it.lat_min],
            ]],
          },
        }));
      cellLayer = L.geoJSON({ type: "FeatureCollection", features }, {
        style: f => ({
          color: "#0008", weight: 0.5,
          fillColor: probColor(f.properties.probability),
          fillOpacity: 0.55,
        }),
        onEachFeature: (f, layer) => {
          const p = f.properties;
          const html = `
            <div style="min-width:200px;">
              <strong>${p.full_label}</strong><br>
              <span style="font-size:18px;font-weight:700;">${formatPct(p.probability)}</span>
              <span style="color:#888;">probabilitas</span><br>
              <small>Cell: ${p.cell_id}</small><br>
              <a href="/area.html?cell=${p.cell_id}">Lihat detail →</a>
            </div>`;
          layer.bindPopup(html);

          layer.on("click", () => {
            if (highlightedLayer && highlightedLayer !== layer) {
              cellLayer.resetStyle(highlightedLayer);
            }
            highlightedLayer = layer;
            layer.setStyle({
              color: "#3b82f6",
              weight: 3,
              fillOpacity: 0.85,
            });
            layer.bringToFront();
          });
        },
      }).addTo(map);
    }

    function renderTop(top, horizon, threshold) {
      const list = document.getElementById("top-list");
      list.innerHTML = top.items.map((it, i) => `
        <li onclick="window.highlightCell('${it.cell_id}')">
          <div style="display:flex; justify-content:space-between; align-items:start;">
            <div>
              <div class="rank">#${i + 1}</div>
              <span class="label">${it.full_label}</span>
            </div>
            <span class="prob" style="color:${probColor(it.probability)}">${formatPct(it.probability)}</span>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 8px;">
            <small style="color:#94a3b8;">M ≥ ${threshold} dalam ${horizon} hari</small>
            <a href="/area.html?cell=${it.cell_id}" onclick="event.stopPropagation();" style="font-size:12px; color:var(--accent); font-weight:600;">Detail →</a>
          </div>
        </li>
      `).join("");
      const ts = top.items[0]?.computed_at;
      document.getElementById("last-update").textContent = `Update: ${formatTime(ts)}`;
    }

    // Search Box Logic
    const searchInput = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");

    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      if (!query) {
        searchResults.innerHTML = "";
        searchResults.style.display = "none";
        return;
      }

      const filtered = allForecastItems
        .filter(it => it.full_label && it.full_label.toLowerCase().includes(query))
        .slice(0, 10);

      if (filtered.length === 0) {
        searchResults.innerHTML = `<li style="color:#94a3b8; font-style:italic; font-size:13px; justify-content:center;">Tidak ada hasil</li>`;
        searchResults.style.display = "block";
        return;
      }

      searchResults.innerHTML = filtered.map(it => `
        <li data-cell-id="${it.cell_id}">
          <span class="res-label">${it.full_label}</span>
          <span class="res-prob" style="color:${probColor(it.probability)}">${formatPct(it.probability)}</span>
        </li>
      `).join("");
      searchResults.style.display = "block";
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-container")) {
        searchResults.style.display = "none";
      }
    });

    searchResults.addEventListener("click", (e) => {
      const li = e.target.closest("li");
      if (li && li.dataset.cellId) {
        const cellId = li.dataset.cellId;
        highlightCell(cellId);
        searchResults.style.display = "none";
        searchInput.value = li.querySelector(".res-label").textContent;
      }
    });

    document.getElementById("horizon").addEventListener("change", loadData);
    document.getElementById("threshold").addEventListener("change", loadData);
    document.getElementById("refresh").addEventListener("click", async () => {
      try {
        await api.post("/api/forecasts/run");
        showToast("Forecast diperbarui", "success");
        loadData();
      } catch (e) { showToast(e.message, "error"); }
    });

    loadData();
    setInterval(loadData, 5 * 60 * 1000); // refresh every 5 minutes
  </script>
</body>
</html>
