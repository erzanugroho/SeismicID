<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>seismicid // changelog</title>
  <link rel="stylesheet" href="/static/css/main.css?v=ai-mvp-v1">
</head>
<body>
  <header id="navbar"></header>
  <main class="page-shell">
    <section class="content-card ai-changelog-page">
      <p class="eyebrow">AI MVP v1</p>
      <h1>changelog otomatis</h1>
      <p class="muted">Ringkasan dibuat dari commit terbaru. Jika AI nonaktif, sistem memakai fallback template dari git log.</p>
      <div class="changelog-meta-row">
        <span>dibuat: <strong id="ai-changelog-time">memuat…</strong></span>
        <span id="ai-changelog-mode">AI</span>
      </div>
      <div class="ai-briefing-card ai-changelog-output">
        <div class="ai-briefing-title">perubahan terbaru</div>
        <div id="ai-changelog-text" class="changelog-list">memuat changelog…</div>
      </div>
      <p class="muted">Catatan: changelog ini bukan info keselamatan gempa. Gunakan BMKG untuk informasi resmi.</p>
    </section>
  </main>
  <script type="module">
    import { api, escapeHtml } from "/static/js/api.js";
    import { renderNavbar } from "/static/js/navbar.js?v=disclaimer-modal-v1";
    renderNavbar("changelog");
    const el = document.getElementById("ai-changelog-text");
    const timeEl = document.getElementById("ai-changelog-time");
    const modeEl = document.getElementById("ai-changelog-mode");
    const inline = (text) => escapeHtml(text || "").replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    const renderAiText = (text) => {
      const lines = String(text || "").split(/\n+/).map(s => s.trim()).filter(Boolean);
      const title = lines.find(line => !line.startsWith("-")) || "Perubahan terbaru";
      const bullets = lines.filter(line => line.startsWith("-")).map(line => line.replace(/^-\s*/, ""));
      el.innerHTML = `
        <h2>${inline(title)}</h2>
        <ul>${bullets.map(item => `<li>${inline(item)}</li>`).join("")}</ul>
      `;
    };
    try {
      const data = await api.get("/api/ai/changelog", { limit: 12, force: true });
      timeEl.textContent = data.generated_at || new Date().toLocaleString("id-ID");
      modeEl.textContent = data.ai_enabled ? "AI aktif" : "fallback";
      renderAiText(data.text || "changelog belum tersedia");
    } catch (e) {
      timeEl.textContent = new Date().toLocaleString("id-ID");
      modeEl.textContent = "error";
      renderAiText(`gagal memuat changelog: ${e.message}`);
    }
  </script>
</body>
</html>
