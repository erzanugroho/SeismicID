services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gempa-forecast:latest
    container_name: gempa-forecast
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
